      .tag { font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 15px; font-weight: 500; letter-spacing: 6px; fill: #7ec99a; }
      .eye { font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 12.5px; font-weight: 400; letter-spacing: 3px; fill: #5a8c6e; }
