<svg width="1280" height="320" viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>FirstFrost — grow-tracking backend</title>
  <desc>FirstFrost project banner. Dark greenhouse-night background, botanical hex grid on the right, serif wordmark and mono tagline on the left.</desc>

